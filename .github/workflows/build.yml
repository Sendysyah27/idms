name: Build APK Kasir
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flet
        run: pip install flet

      - name: Rakit APK
        run: flet build apk

      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Kasir-Android
          path: build/apk/**/*.apk
