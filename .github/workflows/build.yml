name: Build APK Kasir
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Rakit APK
        run: flet build apk

      - name: Upload Hasil APK
        uses: actions/upload-artifact@v3
        with:
          name: Aplikasi-Kasir-Android
          path: build/apk/**/*.apk
