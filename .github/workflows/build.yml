name: Build APK Kasir
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0' # Versi yang paling stabil buat Flet 0.25

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet==0.25.2

      - name: Rakit APK
        run: |
          # Terima lisensi Android otomatis
          yes | flutter doctor --android-licenses || true
          # Proses rakit
          flet build apk
          
      - name: Upload Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Kasir-Android
          path: build/apk/**/*.apk
